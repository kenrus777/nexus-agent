name: Deploy Game to itch.io\n\non:\n  push:\n    branches: [main]\n    paths: [\"game/**\"]\n  workflow_dispatch:\n    inputs:\n      version:\n        description: \"Version tag (e.g. v1.2.0)\"\n        required: false\n        default: \"latest\"\n\njobs:\n  deploy:\n    runs-on: ubuntu-latest\n    timeout-minutes: 15\n    steps:\n      - uses: actions/checkout@v4\n      - name: Install Butler\n        run: |\n          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default\n          unzip butler.zip\n          chmod +x butler\n          ./butler -V\n      - name: Deploy to itch.io\n        run: |\n          ./butler push game/ \\\n            ${{ secrets.ITCHIO_USERNAME }}/${{ secrets.ITCHIO_GAME_NAME }}:html5 \\\n            --userversion ${{ github.event.inputs.version || format('build-{0}', github.run_number) }}\n        env:\n          BUTLER_API_KEY: ${{ secrets.ITCHIO_API_KEY }}\n      - name: Done\n        run: echo \"Game deployed to https://${{ secrets.ITCHIO_USERNAME }}.itch.io/${{ secrets.ITCHIO_GAME_NAME }}\"\n