# .github/workflows/social-post.yml\n# Runs every day at 6PM SGT (10:00 UTC)\nname: Daily Social Post\n\non:\n  schedule:\n    - cron: \"0 10 * * *\"\n    - cron: \"0 2 * * 5\"\n  workflow_dispatch:\n    inputs:\n      platform:\n        description: \"Platform to post to\"\n        required: false\n        default: \"all\"\n        type: choice\n        options: [all, facebook, twitter]\n\njobs:\n  post:\n    runs-on: ubuntu-latest\n    timeout-minutes: 10\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n          node-version: \"20\"\n          cache: \"npm\"\n      - run: npm install\n      - name: Post to Facebook\n        run: node scripts/post-to-social.js\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}\n          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}\n          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}\n          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}\n          GAME_NAME: ${{ secrets.GAME_NAME }}\n          GAME_URL: ${{ secrets.GAME_URL }}\n      - name: Post to Twitter\n        run: node scripts/post-to-twitter.js\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}\n          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}\n          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}\n          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}\n          GAME_NAME: ${{ secrets.GAME_NAME }}\n          GAME_URL: ${{ secrets.GAME_URL }}\n